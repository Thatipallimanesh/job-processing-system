spring.application.name=api-gateway

server.port=8765
spring.cloud.gateway.discovery.locator.enabled=true

# Routing configuration
spring.cloud.gateway.server.webmvc.routes[0].id=job-service
spring.cloud.gateway.server.webmvc.routes[0].uri=lb://job-service
spring.cloud.gateway.server.webmvc.routes[0].predicates[0]=Path=/jobs/**

spring.cloud.gateway.server.webmvc.routes[1].id=application-service
spring.cloud.gateway.server.webmvc.routes[1].uri=lb://application-service
spring.cloud.gateway.server.webmvc.routes[1].predicates[0]=Path=/applications/**